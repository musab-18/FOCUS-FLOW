name: focusflow
description: "A productivity app to help you focus, track tasks, and achieve your goals."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.1
  firebase_crashlytics: ^4.2.0

  # State Management
  provider: ^6.1.2

  # UI & Charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.4
  table_calendar: ^3.1.3
  lottie: ^3.3.1
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
