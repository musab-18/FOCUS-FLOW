name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Uses the latest stable version
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env for testing
        run: |
          echo "FIREBASE_API_KEY_ANDROID=test" > .env
          echo "FIREBASE_APP_ID_ANDROID=test" >> .env
          echo "FIREBASE_API_KEY_IOS=test" >> .env
          echo "FIREBASE_APP_ID_IOS=test" >> .env
          echo "FIREBASE_API_KEY_WEB=test" >> .env
          echo "FIREBASE_APP_ID_WEB=test" >> .env
          echo "FIREBASE_PROJECT_ID=test" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=test" >> .env
          echo "FIREBASE_STORAGE_BUCKET=test" >> .env

      - name: Run tests
        run: flutter test test/analytics_test.dart

      - name: Build APK (Debug)
        run: flutter build apk --debug
